name: Monthly WebfreeCloud Reminder

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 15 * *"   # 每月15日 02:00 UTC

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram reminder
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.CHAT_ID }} \
          -d text="🔔 WebFreeCloud续期提醒：请检查 WebFreeCloud 服务器是否需要续期（15日例行提醒）"
